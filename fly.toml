app = "memlayer"
primary_region = "iad"

[build]
  dockerfile = "deploy/Dockerfile.cloud"

[http_service]
  internal_port = 8420
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      interval = "15s"
      timeout = "5s"
      grace_period = "30s"
      method = "GET"
      path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "response_files"
  destination = "/data/response_files"
