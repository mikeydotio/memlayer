name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-daemon:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: memlayer-daemon-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: memlayer-daemon-linux-aarch64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: memlayer-daemon-macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build daemon
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: daemon

      - name: Package binary
        run: |
          mkdir -p dist
          cp daemon/target/${{ matrix.target }}/release/memlayer-daemon dist/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist memlayer-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build CLI
        run: npm ci && npx tsc
        working-directory: cli

      - name: Package CLI
        run: |
          tar -czf memlayer-cli.tar.gz -C cli dist node_modules package.json

      - uses: actions/upload-artifact@v4
        with:
          name: memlayer-cli
          path: memlayer-cli.tar.gz

  release:
    needs: [build-daemon, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/memlayer-daemon-linux-x86_64.tar.gz
            artifacts/memlayer-daemon-linux-aarch64.tar.gz
            artifacts/memlayer-daemon-macos-aarch64.tar.gz
            artifacts/memlayer-cli.tar.gz
