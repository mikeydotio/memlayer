services:
  db:
    image: pgvector/pgvector:pg16
    container_name: memlayer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: memlayer
      POSTGRES_USER: memlayer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./db/init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memlayer -d memlayer"]
      interval: 5s
      timeout: 3s
      retries: 10
    shm_size: 256mb

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: memlayer-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://memlayer:${POSTGRES_PASSWORD}@db:5432/memlayer
      MEMLAYER_AUTH_TOKEN: ${MEMLAYER_AUTH_TOKEN}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      FILE_STORAGE_PATH: /data/response_files
      FILE_STORAGE_SOFT_LIMIT: ${FILE_STORAGE_SOFT_LIMIT:-0}
      FILE_STORAGE_HARD_LIMIT: ${FILE_STORAGE_HARD_LIMIT:-0}
      LARGE_RESPONSE_THRESHOLD_SEARCH: ${LARGE_RESPONSE_THRESHOLD_SEARCH:-5000}
      LARGE_RESPONSE_THRESHOLD_SESSION: ${LARGE_RESPONSE_THRESHOLD_SESSION:-5000}
      EVICTION_INTERVAL_SECS: ${EVICTION_INTERVAL_SECS:-60}
      INDEX_MODE: ${INDEX_MODE:-off}
      INDEX_LLM_PROVIDER: ${INDEX_LLM_PROVIDER:-}
      INDEX_LLM_MODEL: ${INDEX_LLM_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - response-files:/data/response_files
      - ./db/migrations/005_response_files.sql:/app/migrations/005_response_files.sql:ro
    ports:
      - "0.0.0.0:8420:8420"

  ollama:
    image: ollama/ollama
    container_name: memlayer-ollama
    profiles: ["local-embeddings"]
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"

volumes:
  pgdata:
  ollama-data:
  response-files:
